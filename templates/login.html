{% extends 'base.html' %}
{% block title %}Login — Report Automation{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">📊</div>
            <h1 class="auth-title">Report Automation</h1>
            <p class="auth-subtitle">Sign in to continue</p>
        </div>
        <form class="auth-form" method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉️</span>
                    <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com"
                        required autofocus value="{{ request.form.get('email', '') }}">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" name="password" class="form-input"
                        placeholder="Enter your password" required>
                    <button type="button" class="toggle-pwd" onclick="togglePwd('password')">👁</button>
                </div>
            </div>
            <button type="submit" class="btn-primary btn-full">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
